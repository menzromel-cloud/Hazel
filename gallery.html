<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hazel Gallery</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- TOP SECTION -->
  <section class="gallery-page-header">

    <img src="images/hazel-logo.png" class="gallery-logo">

    <h1>Hazel's Memories 💖</h1>

    <p>
      Upload photos directly from your phone, laptop, or tablet.
    </p>

  </section>


  <!-- IMAGE UPLOAD -->
  <section class="upload-section">

    <label for="imageUpload" class="upload-btn">
      📸 Upload Photos
    </label>

    <input type="file" id="imageUpload" multiple accept="image/*">

  </section>


  <!-- GALLERY -->
  <section class="dynamic-gallery">

    <div id="galleryContainer" class="gallery-masonry"></div>

  </section>


  <script src="gallery.js"></script>

</body>
</html>
